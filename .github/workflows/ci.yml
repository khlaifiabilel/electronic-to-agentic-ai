name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    name: Discover projects
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.list.outputs.projects }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        name: List directories containing a pyproject.toml
        run: |
          projects=$(find . -mindepth 2 -name pyproject.toml \
              -not -path '*/.venv/*' -not -path '*/.*/*' \
            | xargs -n1 dirname \
            | sed 's|^\./||' \
            | sort \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "projects=${projects}" >> "$GITHUB_OUTPUT"
          echo "Discovered projects: ${projects}"

  quality:
    name: ${{ matrix.project }}
    needs: discover
    if: ${{ needs.discover.outputs.projects != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.discover.outputs.projects) }}
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync environment (locked)
        run: uv sync --locked

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type-check (mypy, strict)
        run: uv run mypy

      - name: Tests (pytest, coverage gate 80%)
        run: uv run pytest
